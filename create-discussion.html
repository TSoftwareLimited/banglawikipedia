<!DOCTYPE html>
<html lang="bn" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>নতুন আলোচনা - উইকিপিডিয়া.বাংলা</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['"Hind Siliguri"', 'sans-serif'] } } } }
    </script>
    <style>
        .glass { @apply bg-white/70 dark:bg-zinc-950/70 backdrop-blur-3xl border-zinc-200/50 dark:border-white/10; }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .skeleton { 
            @apply rounded-xl;
            background: linear-gradient(90deg, #e4e4e7 25%, #f4f4f5 50%, #e4e4e7 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite linear;
        }
        .dark .skeleton {
            background: linear-gradient(90deg, #27272a 25%, #3f3f46 50%, #27272a 75%);
            background-size: 200% 100%;
        }
    </style>
</head>
<body class="bg-zinc-50 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-300 font-sans antialiased min-h-screen">

    <nav class="sticky top-0 z-50 h-16 glass flex items-center px-4 lg:px-6 justify-between transition-colors duration-300 border-b border-zinc-200 dark:border-zinc-800">
        <div onclick="window.location.href='index.html'" class="flex items-center gap-3 cursor-pointer">
            <div class="w-9 h-9 bg-zinc-900 dark:bg-white rounded-xl flex items-center justify-center transition-colors">
                <span class="text-lg text-white dark:text-black font-bold">উ</span>
            </div>
            <span class="font-bold text-lg text-zinc-900 dark:text-white">উইকিপিডিয়া<span class="text-zinc-500">.বাংলা</span></span>
        </div>
        <button onclick="window.location.href='index.html#discuss'" class="px-4 py-2 text-sm font-medium bg-zinc-100 dark:bg-zinc-900 rounded-xl hover:bg-zinc-200 dark:hover:bg-zinc-800 transition-colors">ফিরে যান</button>
    </nav>

    <main class="max-w-3xl mx-auto p-6 lg:p-12">
        <div class="space-y-2 mb-10">
            <h1 class="text-4xl font-black text-zinc-900 dark:text-white">নতুন আলোচনা শুরু করুন</h1>
            <p class="text-zinc-500">আপনার প্রশ্ন বা মতামত এখানে লিখুন।</p>
        </div>

        <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-[2.5rem] p-8 space-y-6 shadow-sm">
            <div class="space-y-2">
                <label class="text-xs font-bold uppercase tracking-wider text-zinc-400 px-1">আলোচনার শিরোনাম</label>
                <input type="text" id="topic-title" placeholder="আলোচনার শিরোনাম (প্রশ্ন)" class="w-full bg-zinc-50 dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-800 rounded-2xl px-5 py-4 focus:outline-none focus:ring-2 focus:ring-blue-500/40 transition-all">
            </div>

            <div class="space-y-2">
                <label class="text-xs font-bold uppercase tracking-wider text-zinc-400 px-1">ছবি যুক্ত করুন (ঐচ্ছিক)</label>
                <input type="file" id="topic-images" multiple accept="image/*" class="w-full bg-zinc-50 dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-800 rounded-2xl px-5 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500/40 transition-all file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-bold file:bg-blue-600 file:text-white hover:file:bg-blue-700 cursor-pointer">
                <div id="image-preview-container" class="grid grid-cols-2 sm:grid-cols-3 gap-4 mt-4 hidden"></div>
            </div>

            <div class="space-y-2">
                <label class="text-xs font-bold uppercase tracking-wider text-zinc-400 px-1">বিস্তারিত বিবরণ</label>
                <textarea id="topic-content" rows="10" placeholder="বিস্তারিত এখানে লিখুন..." class="w-full bg-zinc-50 dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-800 rounded-2xl px-5 py-4 focus:outline-none focus:ring-2 focus:ring-blue-500/40 transition-all"></textarea>
            </div>

            <button id="submit-topic" class="w-full py-5 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-2xl shadow-xl shadow-blue-500/20 active:scale-[0.98] transition-all text-lg">
                পোস্ট করুন
            </button>
        </div>
    </main>

    <div id="toast-container" class="fixed bottom-8 left-1/2 -translate-x-1/2 flex flex-col gap-3 z-[300] w-full max-w-md px-4 pointer-events-none"></div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

        const supabaseUrl = 'https://ejawztjfekggwtlyymym.supabase.co';
        const supabaseKey = 'sb_publishable_qzyHuTPdiitg0FZE6XCA5g_orpm2TsH';
        const supabase = createClient(supabaseUrl, supabaseKey);

        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `flex items-center gap-3 px-6 py-4 rounded-2xl shadow-2xl glass border pointer-events-auto transition-all duration-300`;
            toast.innerHTML = `<p class="font-bold text-sm ${type === 'error' ? 'text-red-500' : 'text-blue-500'}">${message}</p>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        const user = JSON.parse(localStorage.getItem('wiki_user'));
        if (!user) window.location.href = 'index.html';

        const imageInput = document.getElementById('topic-images');
        const previewContainer = document.getElementById('image-preview-container');

        // Image Preview Logic
        imageInput.onchange = () => {
            const files = Array.from(imageInput.files);
            if (files.length > 0) {
                previewContainer.innerHTML = '';
                previewContainer.classList.remove('hidden');
                files.forEach((file, index) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const div = document.createElement('div');
                        div.className = 'relative aspect-video sm:aspect-square rounded-2xl overflow-hidden bg-zinc-100 dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-800 group animate-in zoom-in-95 duration-300';
                        div.innerHTML = `
                            <img src="${e.target.result}" class="w-full h-full object-cover">
                            <div id="progress-overlay-${index}" class="absolute inset-0 bg-black/70 backdrop-blur-[2px] flex items-center justify-center opacity-0 transition-opacity duration-300">
                                <div class="flex flex-col items-center gap-2">
                                    <div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                                    <span id="progress-text-${index}" class="text-white text-[10px] font-black tracking-widest">0%</span>
                                </div>
                            </div>
                        `;
                        previewContainer.appendChild(div);
                    };
                    reader.readAsDataURL(file);
                });
            } else {
                previewContainer.classList.add('hidden');
            }
        };

        async function uploadMultipleImages(files) {
            const promises = Array.from(files).map((file, index) => {
                return new Promise((resolve, reject) => {
                    const xhr = new XMLHttpRequest();
                    const formData = new FormData();
                    formData.append('key', 'a861b1b999d131e58bda7029ab6eee29');
                    formData.append('image', file);

                    const overlay = document.getElementById(`progress-overlay-${index}`);
                    const text = document.getElementById(`progress-text-${index}`);
                    if (overlay) overlay.classList.replace('opacity-0', 'opacity-100');

                    xhr.upload.onprogress = (e) => {
                        if (e.lengthComputable && text) {
                            const percent = Math.round((e.loaded / e.total) * 100);
                            text.textContent = percent + '%';
                        }
                    };

                    xhr.onload = () => {
                        const resp = JSON.parse(xhr.responseText);
                        if (resp.success) resolve(resp.data.url);
                        else reject(new Error('আপলোড ব্যর্থ হয়েছে'));
                    };
                    xhr.onerror = () => reject(new Error('নেটওয়ার্ক ত্রুটি'));
                    xhr.open('POST', 'https://api.imgbb.com/1/upload');
                    xhr.send(formData);
                });
            });
            return Promise.all(promises);
        }

        document.getElementById('submit-topic').onclick = async () => {
            const title = document.getElementById('topic-title').value.trim();
            const content = document.getElementById('topic-content').value.trim();
            const imageFiles = document.getElementById('topic-images').files;

            if (!title || !content) return showToast('শিরোনাম এবং বিবরণ লিখুন।', 'error');

            const btn = document.getElementById('submit-topic');
            btn.disabled = true;
            btn.textContent = 'পোস্ট করা হচ্ছে...';

            try {
                const imageUrls = await uploadMultipleImages(imageFiles);
                const { error } = await supabase.from('discussions').insert([{ 
                    title, 
                    author: user.full_name, 
                    user_id: user.id,
                    content,
                    image_urls: imageUrls
                }]);

                if (error) throw error;

                showToast('আপনার আলোচনা সফলভাবে শুরু হয়েছে!', 'success');
                setTimeout(() => window.location.href = 'index.html#discuss', 1500);
            } catch (err) {
                showToast('ত্রুটি: ' + err.message, 'error');
                btn.disabled = false;
                btn.textContent = 'পোস্ট করুন';
            }
        };
    </script>
</body>
</html>
