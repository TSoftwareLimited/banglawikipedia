<!DOCTYPE html>
<html lang="bn" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>বিভাগসমূহ - উইকিপিডিয়া.বাংলা</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['"Hind Siliguri"', 'sans-serif'] },
                    colors: { zinc: { 850: '#202022', 950: '#0c0c0e' } }
                }
            }
        }
    </script>
    <style>
        .glass { @apply bg-white/70 dark:bg-zinc-950/70 backdrop-blur-3xl border-zinc-200/50 dark:border-white/10; }
        .skeleton { @apply animate-pulse bg-zinc-200 dark:bg-zinc-800 rounded-xl; }
    </style>
</head>
<body class="bg-zinc-50 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-300 font-sans antialiased min-h-screen">

    <nav class="sticky top-0 z-50 h-16 border-b glass flex items-center px-4 lg:px-6 justify-between transition-colors duration-300">
        <div onclick="window.location.href='index.html'" class="flex items-center gap-3 cursor-pointer">
            <div class="w-9 h-9 bg-zinc-900 dark:bg-white rounded-xl flex items-center justify-center transition-colors">
                <span class="text-lg text-white dark:text-black font-bold">উ</span>
            </div>
            <span class="font-bold text-lg text-zinc-900 dark:text-white">উইকিপিডিয়া<span class="text-zinc-500">.বাংলা</span></span>
        </div>
        <button onclick="window.location.href='index.html'" class="px-4 py-2 text-sm font-medium bg-zinc-100 dark:bg-zinc-900 rounded-xl hover:bg-zinc-200 dark:hover:bg-zinc-800 transition-colors">ফিরে যান</button>
    </nav>

    <div class="max-w-[1600px] mx-auto flex">
        <aside class="hidden lg:flex flex-col w-64 h-[calc(100vh-64px)] sticky top-16 p-6 gap-8 border-r border-zinc-200 dark:border-zinc-800 overflow-y-auto">
            <div class="space-y-2">
                <p class="text-xs font-bold text-zinc-400 uppercase px-3 mb-4 tracking-wider">মেনু</p>
                <a href="index.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-zinc-100 dark:hover:bg-zinc-900 text-zinc-600 dark:text-zinc-400 hover:text-zinc-900 dark:hover:text-zinc-100 transition-all">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                    প্রধান পাতা
                </a>
                <a href="categories.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl bg-blue-500/10 text-blue-600 dark:text-blue-400 font-medium transition-all">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4 6h16M4 12h16M4 18h7"></path></svg>
                    বিভাগসমূহ
                </a>
            </div>
        </aside>

        <main class="flex-1 p-6 lg:p-12">
            <div class="mb-10 space-y-2">
                <h1 class="text-4xl font-black text-zinc-900 dark:text-white">সকল বিভাগ</h1>
                <p class="text-zinc-500">বিষয় অনুযায়ী আমাদের নিবন্ধগুলো খুঁজে দেখুন।</p>
            </div>

            <div id="loading" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="h-32 skeleton"></div>
                <div class="h-32 skeleton"></div>
                <div class="h-32 skeleton"></div>
                <div class="h-32 skeleton"></div>
                <div class="h-32 skeleton"></div>
                <div class="h-32 skeleton"></div>
            </div>

            <div id="categories-grid" class="hidden grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Categories will be injected here -->
            </div>

            <div id="no-data" class="hidden text-center py-20 space-y-4">
                <div class="w-20 h-20 bg-zinc-100 dark:bg-zinc-900 rounded-full flex items-center justify-center mx-auto text-zinc-400">
                    <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4 6h16M4 12h16M4 18h7"></path></svg>
                </div>
                <p class="text-zinc-500">কোনো বিভাগ খুঁজে পাওয়া যায়নি।</p>
            </div>
        </main>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

        const supabaseUrl = 'https://ejawztjfekggwtlyymym.supabase.co';
        const supabaseKey = 'sb_publishable_qzyHuTPdiitg0FZE6XCA5g_orpm2TsH';
        const supabase = createClient(supabaseUrl, supabaseKey);

        async function fetchCategories() {
            try {
                // We fetch all unique categories from the articles table
                const { data: articles, error } = await supabase
                    .from('articles')
                    .select('category');

                if (error) throw error;

                const uniqueCategories = [...new Set(articles.map(a => a.category || 'সাধারণ'))];
                
                if (uniqueCategories.length > 0) {
                    renderCategories(uniqueCategories);
                } else {
                    document.getElementById('loading').classList.add('hidden');
                    document.getElementById('no-data').classList.remove('hidden');
                }
            } catch (err) {
                console.error('Fetch error:', err);
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('no-data').classList.remove('hidden');
            }
        }

        function renderCategories(categories) {
            const grid = document.getElementById('categories-grid');
            document.getElementById('loading').classList.add('hidden');
            grid.classList.remove('hidden');
            grid.classList.add('grid');

            const colors = [
                'from-blue-500 to-indigo-600',
                'from-purple-500 to-pink-600',
                'from-emerald-500 to-teal-600',
                'from-orange-500 to-red-600',
                'from-amber-500 to-orange-600',
                'from-cyan-500 to-blue-600'
            ];

            grid.innerHTML = categories.map((cat, index) => {
                const gradient = colors[index % colors.length];
                return `
                    <div class="group relative bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-3xl p-6 hover:shadow-xl hover:shadow-blue-500/5 transition-all cursor-pointer overflow-hidden">
                        <div class="absolute top-0 right-0 w-32 h-32 bg-gradient-to-br ${gradient} opacity-5 group-hover:opacity-10 transition-opacity rounded-full -mr-16 -mt-16"></div>
                        
                        <div class="relative space-y-4">
                            <div class="w-12 h-12 rounded-2xl bg-gradient-to-br ${gradient} flex items-center justify-center text-white shadow-lg">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path>
                                </svg>
                            </div>
                            <div>
                                <h3 class="text-xl font-bold text-zinc-900 dark:text-white">${cat}</h3>
                                <p class="text-sm text-zinc-500 mt-1">এই বিভাগের নিবন্ধগুলো দেখুন</p>
                            </div>
                            <div class="flex items-center gap-2 text-blue-600 dark:text-blue-400 font-bold text-xs uppercase tracking-widest pt-2 group-hover:gap-3 transition-all">
                                প্রবেশ করুন
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"></path></svg>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        fetchCategories();
    </script>
</body>
</html>
