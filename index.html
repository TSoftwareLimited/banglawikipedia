    <script>

            let winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            let scrolled = (winScroll / height) * 100;
            document.getElementById("progressBar").style.width = scrolled + "%";
        };

        // Theme Toggle
        const toggleBtn = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        
        toggleBtn.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            themeIcon.innerHTML = isDark 
                ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>'
                : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>';
        });
    </script>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

        // User Provided Credentials
        const supabaseUrl = 'https://ejawztjfekggwtlyymym.supabase.co';
        const supabaseKey = 'sb_publishable_qzyHuTPdiitg0FZE6XCA5g_orpm2TsH';
        const supabase = createClient(supabaseUrl, supabaseKey);

        // Random Article Navigation
        document.getElementById('random-article-btn').onclick = async () => {
            try {
                const { data, error } = await supabase.from('articles').select('slug');
                if (error) throw error;
                if (data && data.length > 0) {
                    const random = data[Math.floor(Math.random() * data.length)];
                    window.location.href = `article.html?slug=${random.slug}`;
                }
            } catch (err) {
                console.error('Random article error:', err);
            }
        };

        async function fetchArticles() {
            try {
                const { data: articles, error } = await supabase
                    .from('articles')
                    .select('*')
                    .order('created_at', { ascending: false })
                    .limit(11);

                if (error) throw error;

                if (articles && articles.length > 0) {
                    renderFeaturedArticle(articles[0]);
                    
                    if (articles.length > 1) {
                        renderSidebarArticles(articles.slice(1));
                    } else {
                        document.getElementById('sidebar-articles').innerHTML = '<p class="text-sm text-zinc-500 p-2">আরও কোনো নিবন্ধ নেই।</p>';
                    }
                } else {
                    showEmptyState();
                }
            } catch (error) {
                console.error('Supabase Error:', error.message);
                showErrorState();
            }
        }

        async function fetchDidYouKnow() {
            try {
                const { data, error } = await supabase
                    .from('did_you_know')
                    .select('*');

                if (error) throw error;
                if (data) {
                    // Shuffle all items and pick 5 random ones
                    const randomItems = data.sort(() => 0.5 - Math.random()).slice(0, 6);
                    renderDidYouKnow(randomItems);
                }
            } catch (error) {
                console.error('Did You Know Error:', error.message);
            }
        }

        function renderDidYouKnow(items) {
            const container = document.getElementById('did-you-know-container');
            container.innerHTML = items.map(item => `
                <div onclick="window.location.href='${item.url || '#'}'" class="flex items-center gap-3 p-2 bg-zinc-50 dark:bg-zinc-800/30 hover:bg-zinc-100 dark:hover:bg-zinc-800 border border-transparent hover:border-zinc-200 dark:hover:border-zinc-700 rounded-xl transition-all cursor-pointer group">
                    <div class="w-16 h-16 rounded-xl bg-yellow-500/10 dark:bg-yellow-500/20 flex items-center justify-center flex-shrink-0 text-yellow-500 transition-colors group-hover:bg-yellow-500 group-hover:text-white">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path></svg>
                    </div>
                    <div class="flex-1">
                        <p class="font-bold text-sm text-zinc-900 dark:text-zinc-100 line-clamp-2 group-hover:text-blue-600 dark:group-hover:text-blue-400 transition-colors leading-tight">${item.content}</p>
                        <div class="flex items-center justify-between mt-1">
                            <p class="text-xs text-zinc-500 font-medium">তথ্য</p>
                            <span class="text-[10px] font-bold bg-zinc-200 dark:bg-zinc-700 px-2 py-0.5 rounded text-zinc-500 dark:text-zinc-400 group-hover:bg-blue-600 group-hover:text-white transition-all">দেখুন</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function fetchStories() {
            try {
                const { data: stories, error } = await supabase
                    .from('stories')
                    .select('*')
                    .order('created_at', { ascending: true });

                if (error) throw error;
                if (stories) renderStories(stories);
            } catch (error) {
                console.error('Stories Error:', error.message);
            }
        }

        function renderStories(stories) {
            const container = document.getElementById('stories-container');
            container.innerHTML = stories.map(story => `
                <div onclick="if('${story.url || ''}') window.location.href='${story.url}'" class="flex-shrink-0 flex flex-col items-center gap-3 cursor-pointer group">
                    <div class="w-28 h-28 rounded-[2rem] p-1 bg-gradient-to-tr from-${story.gradient_from} to-${story.gradient_to} shadow-lg shadow-${story.shadow_color} group-active:scale-95 transition-all">
                        <div class="w-full h-full rounded-[1.8rem] border-4 border-zinc-50 dark:border-zinc-950 overflow-hidden bg-zinc-200 dark:bg-zinc-800">
                            <img src="${story.image_url}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                        </div>
                    </div>
                    <span class="text-xs font-bold text-zinc-500 dark:text-zinc-400">${story.title}</span>
                </div>
            `).join('');
        }

        function renderFeaturedArticle(article) {
            const titleEl = document.getElementById('featured-title');
            const excerptEl = document.getElementById('featured-excerpt');
            const imageEl = document.getElementById('featured-image');
            const categoryEl = document.getElementById('featured-category');
            const btnEl = document.getElementById('read-more-btn');

            // Remove Skeletons
            titleEl.classList.remove('skeleton', 'w-3/4', 'h-12');
            excerptEl.classList.remove('skeleton', 'w-full', 'h-24');

            // Inject Data
            titleEl.textContent = article.title || 'শিরোনাম বিহীন';
            excerptEl.textContent = article.excerpt || 'কোনো বিবরণ নেই...';
            btnEl.classList.remove('hidden');
            btnEl.classList.add('flex');
            
            btnEl.onclick = () => {
                window.location.href = `article.html?slug=${article.slug}`;
            };
            
            if (article.category) {
                categoryEl.textContent = article.category;
                categoryEl.classList.remove('hidden');
            }

            if (article.image_url) {
                imageEl.src = article.image_url;
                imageEl.onload = () => imageEl.classList.remove('opacity-0');
            } else {
                imageEl.src = 'https://images.unsplash.com/photo-1503676260728-1c00da094a0b?q=80&w=1200'; // Fallback image
                imageEl.onload = () => imageEl.classList.remove('opacity-0');
            }
        }

        function renderSidebarArticles(articles) {
            const container = document.getElementById('sidebar-articles');
            container.innerHTML = ''; // Clear skeletons

            articles.forEach(article => {
                const imgUrl = article.image_url || 'https://images.unsplash.com/photo-1518349619113-03114f06ac3a?w=100';
                const articleHTML = `
                    <div onclick="window.location.href='article.html?slug=${article.slug}'" class="flex items-center gap-3 p-2 bg-zinc-50 dark:bg-zinc-800/30 hover:bg-zinc-100 dark:hover:bg-zinc-800 border border-transparent hover:border-zinc-200 dark:hover:border-zinc-700 rounded-xl transition-all cursor-pointer group">
                        <div class="w-16 h-16 rounded-xl bg-zinc-200 dark:bg-zinc-800 overflow-hidden flex-shrink-0">
                            <img src="${imgUrl}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                        </div>
                        <div class="flex-1">
                            <p class="font-bold text-sm text-zinc-900 dark:text-zinc-100 line-clamp-2 group-hover:text-blue-600 dark:group-hover:text-blue-400 transition-colors leading-tight">${article.title}</p>
                            <p class="text-xs text-zinc-500 mt-1 font-medium">${article.category || 'সাধারণ'}</p>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', articleHTML);
            });
        }

        function showEmptyState() {
            document.getElementById('featured-title').textContent = "ডেটাবেসে কোনো নিবন্ধ নেই";
            document.getElementById('featured-title').classList.remove('skeleton');
            document.getElementById('featured-excerpt').textContent = "Supabase ড্যাশবোর্ডে গিয়ে 'articles' টেবিলে কিছু ডেটা যুক্ত করুন।";
            document.getElementById('featured-excerpt').classList.remove('skeleton');
            document.getElementById('sidebar-articles').innerHTML = '<p class="text-sm text-zinc-500">ডেটাবেস খালি।</p>';
        }

        function showErrorState() {
            document.getElementById('featured-title').textContent = "সংযোগ ত্রুটি";
            document.getElementById('featured-title').classList.remove('skeleton');
            document.getElementById('featured-excerpt').textContent = "Supabase এর সাথে সংযোগ করতে সমস্যা হচ্ছে। আপনার Console চেক করুন।";
            document.getElementById('featured-excerpt').classList.remove('skeleton');
            document.getElementById('sidebar-articles').innerHTML = '<p class="text-sm text-red-500">ডেটা লোড করা যায়নি।</p>';
        }

        // Initialize Fetch
        fetchArticles();
        fetchStories();
        fetchDidYouKnow();
    </script>
</body>
</html>
